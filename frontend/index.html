<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Create Account</title>
<link rel="stylesheet" href="/frontend/style.css">
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="mainForm">
  <input type="text" placeholder="First name" required>
  <input type="text" placeholder="Last name" required>
  <input type="email" placeholder="Email" required>

  <div class="recaptcha-box" id="recaptchaBox">
    <div class="checkbox" id="checkbox"></div>

    <div class="recaptcha-text">
      I'm not a robot
    </div>

    <div class="recaptcha-logo">
      <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA logo">
      <div class="recaptcha-small">reCAPTCHA</div>
      <div class="recaptcha-terms">Privacy - Terms</div>
    </div>
  </div>

  <button id="submitBtn" disabled>Create Account</button>
</form>

</div>

<div class="captcha-popup" id="captchaPopup" hidden>
  <div class="captcha-card">
    <div class="captcha-header">
      <span>Select all images with</span>
      <strong id="targetClass">cars</strong>
    </div>

    <div class="captcha-grid" id="captchaGrid"></div>

    <div class="captcha-footer">
      <button id="refreshBtn" class="icon-btn" type="button">↻</button>
      <button id="verifyBtn" class="verify-btn" type="button">VERIFY</button>
    </div>

    <p id="errorMsg" class="error-msg"></p>
  </div>
</div>

<script src="/frontend/script.js"></script>

</body>
</html>
